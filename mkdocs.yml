site_name: mrlay's space
site_url: https://mrlay.github.io
site_author: mrlay
site_description: 这是我的个人博客，分享技术与生活

theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    logo: material/library
markdown_extensions:
  - admonition
  - codehilite:
      guess_lang: false
  - toc:
      permalink: true

plugins:
  - search
  - minify:
      minify_html: true
  - git-revision-date
  - awesome-pages
